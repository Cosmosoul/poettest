<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>诗魂探测仪</title>

        body {

            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(70,100,60,0.1) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(50,80,40,0.08) 1.5%, transparent 2%);
            background-size: 60px 60px, 45px 45px;
            pointer-events: none;
            animation: drift 25s linear infinite;
            z-index: 0;
        }
        @keyframes drift {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 120px 80px, 90px 100px; }
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 245, 0.96);
            backdrop-filter: blur(1px);
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(30, 60, 20, 0.4);
            overflow: hidden;
            border: 1px solid #cfdfc2;
            position: relative;
            z-index: 2;
        }
        .header {
            background: #f4fcec;
            padding: 24px 20px 20px;
            text-align: center;
            border-bottom: 2px solid #bcdd9e;
        }
        .header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            color: #2a6b2a;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header h1::before { content: "📜"; font-size: 1.8rem; }
        .header p { color: #5a7a4a; font-size: 0.8rem; margin-top: 8px; }
        .quiz-card { padding: 24px 22px 32px; background: white; }
        .start-screen, .result-screen { text-align: center; }
        .start-screen h2 {
            font-size: 1.5rem;
            color: #2f6b2f;
            border-left: 4px solid #8bc34a;
            padding-left: 16px;
            text-align: left;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .start-screen p {
            background: #f6fcf0;
            padding: 24px;
            border-radius: 32px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #2f4a2a;
            border: 1px solid #d4e8ca;
            text-align: left;
            margin-bottom: 28px;
        }
        .btn {
            background: #5e9b4e;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 #2f6a27;
            font-family: inherit;
        }
        .btn:hover { background: #77b363; transform: translateY(-2px); box-shadow: 0 5px 0 #2f6a27; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2f6a27; }
        .question-area { display: none; }
        .progress-bar {
            height: 6px;
            background: #e3f0db;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #5e9b4e;
            transition: width 0.2s;
        }
        .q-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
        }
        .q-counter {
            background: #e2efda;
            padding: 4px 14px;
            border-radius: 60px;
            color: #2f6b2f;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .q-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 16px 0 26px;
            color: #1b3b1b;
            background: #fefef7;
            padding: 20px 18px;
            border-radius: 32px;
            border: 1px solid #cbe3c2;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option {
            background: #fefef9;
            border: 1px solid #cde0c2;
            border-radius: 48px;
            padding: 12px 18px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .option:hover { background: #edf7e6; border-color: #9bc47a; }
        input[type="radio"] {
            accent-color: #5f9e4a;
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            color: #2f4825;
            line-height: 1.4;
            font-size: 0.92rem;
        }
        .unsure-option { border: 1px dashed #b8cfaa; background: #fafef5; }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 12px;
        }
        .nav-btn {
            background: #cbe2be;
            box-shadow: 0 2px 0 #96b581;
            color: #2a562a;
            font-size: 0.9rem;
            padding: 10px 18px;
            flex: 1;
        }
        .nav-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .result-screen { display: none; }
        .result-content {
            background: #ffffff;
            border-radius: 32px;
            padding: 12px 16px 20px;
        }
        .ascii-quill {
            text-align: center;
            font-family: monospace;
            font-size: 0.85rem;
            color: #7ba05b;
            margin-bottom: 12px;
            white-space: pre;
        }
        .result-sub {
            font-size: 1rem;
            color: #4a6741;
            margin-top: 6px;
            margin-bottom: 8px;
            font-style: italic;
            text-align: center;
        }
        .result-title {
            font-size: 2rem;
            font-weight: 800;
            color: #2d6a2d;
            text-align: center;
            margin: 10px 0 6px;
            background: #eef5ea;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            border: 2px solid #b8d9a4;
        }
        .match-rate {
            background: #ecf5e5;
            color: #3c6e2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            display: inline-block;
            margin: 12px auto;
            font-weight: 500;
        }
        .result-desc {
            font-size: 0.96rem;
            line-height: 1.55;
            background: #fefef6;
            padding: 22px 20px;
            border-radius: 28px;
            margin: 16px 0 18px;
            border: 1px solid #dcebd2;
            text-align: left;
            color: #2e4128;
        }
        .analysis-section {
            margin: 20px 0 20px;
            background: #f4f9f0;
            border-radius: 28px;
            padding: 16px;
            text-align: left;

        .analysis-title {
            font-weight: 700;
            color: #2d6a2d;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        .radar-container {
            max-width: 260px;
            margin: 0 auto 16px;
        }
        .dimension-scores {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 8px;
            font-size: 0.8rem;
            margin-top: 12px;
        }
        .dimension-item {
            background: white;
            padding: 6px 10px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #cde0c2;

            margin-top: 6px;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            padding: 10px 22px;

        .restart-btn {

            box-shadow: 0 2px 0 #9abb86;
            color: #2d572d;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .disclaimer {
            text-align: center;
            font-size: 0.6rem;
            color: #92a982;
            margin-top: 20px;
            border-top: 1px solid #ddecd5;
            padding-top: 14px;
        }
        footer {
            background: #eef5e9;
            padding: 12px;
            text-align: center;
            font-size: 0.65rem;
            color: #6f8f5e;
            border-top: 1px solid #cfe2c4;
        }
        @media (max-width: 550px) {
            .container { max-width: 100%; }
            .q-text { font-size: 1.1rem; }
            .result-title { font-size: 1.5rem; }
            .option label { font-size: 0.8rem; }
            .header h1 { font-size: 1.4rem; }
            .dimension-scores { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="container" id="app">
    <div class="header">
        <h1>诗魂探测仪</h1>
        <p>测测哪个诗人与你同频共振</p>
    </div>
    <div class="quiz-card">
        <div id="startScreen" class="start-screen">
            <h2>📖 诗心镜像</h2>
            <p>你的意象偏好、语言趣味与情感倾向，将精确锁定与你灵魂共鸣的诗人。<br>
            <strong>20道特征题</strong>基于<strong>向量相似度算法</strong>，输出与你最契合的诗人及详细指标分析。<br>
            <button class="btn" id="startBtn">▶ 开始测试</button>
        </div>
        <div id="questionArea" class="question-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="q-meta">
                <span class="q-counter" id="qCounter">第1 / 20题</span>
                <span style="font-size:0.7rem;">⚡ 相信直觉</span>
            </div>
            <div class="q-text" id="questionText"></div>
            <div class="options-list" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn nav-btn" id="prevBtn">◀ 回看</button>
                <button class="btn nav-btn" id="nextBtn">下一题 ▶</button>
            </div>
        </div>
        <div id="resultScreen" class="result-screen">
            <div class="result-content" id="resultCaptureArea">
                <div class="ascii-quill">│   诗 魂 鉴 定 书     │</div>
                <div class="result-sub">与你灵魂共振的诗人是 ——</div>
                <div style="text-align: center;"><div class="result-title" id="resultTitle"></div></div>
                <div style="text-align: center;"><span class="match-rate" id="matchRate"></span></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="analysis-section" id="analysisSection">
                    <div class="analysis-title">📊 你的诗学气质分析</div>
                    <div class="radar-container"><canvas id="radarChart" width="250" height="250"></canvas></div>
                    <div class="dimension-scores" id="dimensionScores"></div>
                    <div class="analysis-text" id="analysisText" style="margin-top:12px; font-size:0.85rem;"></div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn share-btn" id="shareBtn">📤 分享结果</button>
                <button class="btn restart-btn" id="restartBtn">🔄 重新检测</button>
            </div>
            <div class="disclaimer">⚠️ 结果基于特征向量匹配，仅供娱乐</div>
        </div>
    </div>
    <footer>诗魂测试</footer>
</div>

    // 详细评价（每人100字以上，仅展示部分核心，完整版包含所有诗人）
    const COMMENTS = {
    "胡适": "白话诗的开创者，《尝试集》语言质朴，打破旧诗桎梏。作为思想家，其诗歌历史意义大于艺术价值，多数作品平直如白话，缺乏回味。他让诗歌从文言走向大众，但牺牲了传统诗词的凝练与美感。革新者的勇气值得尊敬，诗艺却未臻成熟。",
    "刘半农": "民歌体的尝试者，《扬鞭集》中有真挚的乡土情感。《教我如何不想她》传世，但整体创作量少，影响力有限。他的价值更多体现在白话诗早期的多样化实验上，语言活泼，贴近民间，但深度与广度不足，未形成独特而持久的美学风格。",
    "徐志摩": "浪漫主义代表，音律优美，《再别康桥》《偶然》等作品情感充沛，极具感染力。但有时流于浮华，深度不足，被鲁迅讥为“富家公子”的浅薄。他的诗是青春期的蜜糖，成年后回味易觉甜腻，却也永远留住了那个时代的纯真与热烈。",
    "闻一多": "格律派领袖，《死水》深刻有力，提倡“三美”（音乐美、绘画美、建筑美）。他的诗兼具激情与理性，将爱国情怀与艺术追求融为一体。后期转向学术，创作中断。他是诗人中的战士，但诗歌艺术上未能臻于化境，形式追求有时压倒了内容表达。",
    "戴望舒": "象征派大师，《雨巷》成为经典，忧郁的现代性探索。《我的记忆》等作品将传统意象与现代情绪结合。他善于营造朦胧凄美的氛围，可惜后期转向革命诗歌，艺术性下降。他是一位被时代耽误的纯粹诗人，其早期作品至今仍具魅力。",
    "卞之琳": "智性诗人，《断章》精巧，《鱼目集》充满哲学思辨。他的诗如水晶，冷而透明，但过于晦涩，不易亲近。读者需要高智商的解码器，普通读者往往知难而退。他在中国现代诗中开创了哲理与意象深度融合的先河，影响深远。",
    "李金发": "中国象征诗第一人，《微雨》晦涩先锋，引入法国象征主义。翻译腔重，语言生硬，接受度极低。他是诗歌界的“天书”作者，历史意义大于可读性。其生硬的语序和奇崛的意象让多数读者望而却步，却为后来者打开了新的语言实验之门。",
    "艾青": "土地与光明的歌者，《大堰河》《雪落在中国的土地上》苦难意识强烈，情感炽热。他将个人命运与民族苦难紧密结合，开创了自由体新诗的雄浑风格。后期说教偏多，诗性减弱。他是时代的号角，但号角吹久了也会刺耳，艺术性有所妥协。",
    "穆旦": "现代主义高峰，《诗八首》冷峻深刻，《赞美》有力。他将西方现代诗技法与中国经验结合，翻译成就甚至超过创作。但语言有时生硬，情感过于克制，如冰下火焰。他是被长期埋没的诗歌巨匠，其思想的复杂与技艺的精湛至今值得深挖。",
    "郑敏": "九叶派代表，《金黄的稻束》哲学入诗，思辨强而情感淡。她的诗像哲学论文的分行，冷峻有余，温度不足。在女性诗人中，她是最不“抒情”的一位。她关注生命与存在，但读者常被其抽象思辨所阻，需要耐心细读。",
    "辛笛": "《手掌》温暖，九叶派中较柔和。《风景》等作品有古典韵味。知名度偏低，长期被文学史忽视。他的诗是温吞水，不烫不凉，适合慢性子。平淡中见真情，但缺少让人惊艳的锋芒。",
    "陈敬容": "《力的前奏》有力，《雕塑家》等作品女性意识早期代表。创作量少，晚年几近沉默。她的诗像刀刻，硬朗但篇幅有限。她敢于书写女性内在的力量，但未能充分展开其才华。",
    "杜运燮": "《秋》有特色，《山》等作品九叶派边缘人物。他的诗理性有余，激情不足，容易被遗忘。他在九叶派中风格相对平实，缺乏辨识度，但某些意象处理颇为独到。",
    "袁可嘉": "学者型诗人，《沉钟》等诗论重于诗作。他的价值在于译介和批评，创作只是副业。他推动了西方现代诗在中国的传播，自己的诗却显得保守，理论与实践存在距离。",
    "北岛": "朦胧诗领袖，《回答》《结局或开始》警句反抗，冷峻锋利。他用简洁有力的语言写出了一个时代的怀疑与不屈。后期创作渐趋重复，语言愈发抽象。他是时代的良心，但良心的唠叨也会让人疲倦，晚年诗作失去了早期那种一击即中的力量。",
    "顾城": "童话诗人，《一代人》《我是一个任性的孩子》纯粹而脆弱。他善于用孩童般的视角发现世界的奇异与残酷。后期陷入极端，诗歌走向黑暗。他的诗是水晶，也是玻璃，美丽而易碎。天才与疯狂仅一步之遥，他的悲剧令人叹息。",
    "海子": "麦地之子，《面朝大海，春暖花开》《亚洲铜》燃烧生命的写作。抒情强烈，但部分作品狂乱失控。他是诗歌的殉道者，但殉道不等于伟大。他的短诗充满神启般的意象，长诗则显得凌乱。过早的死亡将他定格为神话，也掩盖了其创作的参差。",
    "舒婷": "《致橡树》《神女峰》影响一代人，浪漫温情。后期平淡，重复自我。她是女性诗歌的启蒙者，但启蒙之后需要更深的挖掘。她的诗具有理想主义色彩，但后期未能突破早期模式，逐渐被更年轻的诗人超越。",
    "食指": "《相信未来》《这是四点零八分的北京》激励无数，精神可嘉。艺术性有限，语言直白如口号。他的价值在于信念，而非技艺。在特殊年代，他的诗是火种；但从纯诗角度看，直白有余，韵味不足。",
    "多多": "朦胧派最晦涩者，《阿姆斯特丹的河流》意象密集。小众推崇，大众远离。他是诗人中的诗人，但只适合极小圈子的膜拜。他的语言高度浓缩，充满超现实变形，阅读门槛极高。",
    "芒克": "白洋淀群像，《阳光中的向日葵》直率豪放。粗糙有余，精致不足。他是力量的象征，但力量需要形式来承载。他的诗有野生的生命力，但艺术打磨不够，显得粗粝。",
    "西川": "知识分子写作代表，《致敬》《鹰的话语》博学智性。概念化较重，情感稀释。他的诗像学术报告，理性压倒感性。他善于处理宏大主题，但有时沦为观念的图解，缺乏鲜活的血肉。",
    "欧阳江河": "词语炼金术士，《玻璃工厂》《傍晚穿过广场》华丽繁复。阅读疲劳，普通读者难以进入。他制造了语言的迷宫，却忘了留出口。其修辞炫技令人惊叹，但也让诗意淹没在词语的狂欢中。",
    "于坚": "口语诗开创者，《尚义街六号》《0档案》日常史诗。质量参差，长篇冗长。他打开了诗歌的日常之门，但门内有时是杂物间。他坚持“拒绝隐喻”，但过度的口语化也让诗失去了必要的凝练与张力。",
    "韩东": "《有关大雁塔》解构经典，反抒情。《你见过大海》影响巨大，但个人魅力大于文本。他是观念的诗人，不是语言的魔术师。他的诗机智、冷峻，但往往止于观念，情感投入不足。",
    "伊沙": "身体写作，《车过黄河》《饿死诗人》解构成癖。争议极大，粗糙生猛。他像诗歌界的闹钟，吵醒很多人，但自己不够清醒。他的诗有冲击力，但艺术性常被质疑，粗俗与先锋一线之隔。",
    "翟永明": "女性诗歌重要声音，《女人》《静安庄》黑暗有力。后期内敛，风格变化。她是黑暗中的舞者，但舞步渐缓。她最早书写女性独特的身体经验与心理暗流，对后来者影响深远，但近年创作趋于平静。",
    "张枣": "语言魔术师，《镜中》《何人斯》不朽。产量极少，但质量极高。他是诗歌界的流星，短暂而耀眼，留下永远的遗憾。他对汉语的敏感和古典意境的现代转化无人能及，可惜英年早逝。",
    "柏桦": "《苏州记事》《在清朝》抒情浓郁，江南才子。格局较小，题材重复。他的诗是精致的盆景，美则美矣，缺乏气象。他专注于个人记忆与江南风物，技艺精湛但格局偏窄。",
    "骆一禾": "早逝诗人，《修远》《大河》大气。未充分展开，神话多于实绩。他是一颗未完成的恒星，光芒更多来自想象。他的长诗雄心勃勃，但未能完成，留下的片段让人惋惜。",
    "戈麦": "《誓言》《南方》悲怆，早逝神话。作品尖锐，但总量少。他是诗歌界的夭折天才，评价往往偏高。他的诗充满死亡意识，语言凌厉，但尚未形成足够丰富的面向。",
    "杨炼": "文化史诗，《诺日朗》《敦煌》雄浑。空洞堆砌，概念先行。他建造了词语的宫殿，但里面空无一人。他热衷于宏大历史与文化符号，但情感与细节缺席，显得徒有骨架。",
    "江河": "《太阳和他的反光》炫技，过犹不及。他的诗像杂技表演，惊叹于技巧，感动于内容。他是朦胧诗中的异数，追求史诗气魄，但往往流于空洞的华丽。",
    "王小妮": "口语化日常，《月光》《上课记》淡雅。过于平淡，缺乏张力。她的诗是白开水，解渴但无味。她记录日常生活与教育现场，真诚朴素，但艺术提炼不足。",
    "林徽因": "才女光环，《你是人间的四月天》温暖。诗才非顶尖，建筑成就更高。她的诗是客厅里的花瓶，好看但不必深究。其诗有闺秀气，情感真挚但技巧平平。",
    "郑愁予": "《错误》古典韵味，浪子情怀。重复自我，后期乏力。他的诗是古典的回声，越传越弱。他善于营造江南意象，但题材单一，后期未突破。",
    "余光中": "《乡愁》《白玉苦瓜》家喻户晓，抒情熟练。后期滥情，口水化。他是乡愁的代言人，但乡愁说多了也烦。他的诗技巧圆熟，但晚年大量创作流于轻浅，失去了早期《白玉苦瓜》的凝重。",
    "洛夫": "超现实主义，《石室之死亡》《漂木》晦涩。冗长，结构松散。他的诗是黑夜中的巨兽，庞大但看不清面目。他追求语言的极端实验，但篇幅过长常让读者失去耐心。",
    "痖弦": "《深渊》《如歌的行板》绝望，张力强。作品少，影响大。他的诗是锋利的刀，但刀身太短。他以少量作品确立了独特的荒诞与悲凉风格，质量极高。",
    "周梦蝶": "《孤独国》《还魂草》禅意，孤绝。过于冷寂，拒人千里。他的诗是雪山的莲花，高洁但无法靠近。他以佛理入诗，语言简净，但意境过于清冷，缺乏人间烟火气。",
    "席慕蓉": "《一棵开花的树》《七里香》小清新，浅薄。畅销诗人的典型，情感廉价。她的诗是糖水，甜但无营养。她捕捉青春期的细腻情感，通俗易懂，但艺术深度不足。",
    "汪国真": "鸡汤顺口溜，浅薄励志。《热爱生命》《山高路远》缺乏诗意，格言化。他是诗歌界的成功学大师，与诗的本质背道而驰。其作品押韵流畅，但思想空洞，属于“伪诗歌”。",
    "余秀华": "《穿过大半个中国去睡你》《摇摇晃晃的人间》直白大胆，真情实感。依赖身体叙事，题材重复。她是一把野火，烧得旺，但燃料有限。她以残疾人的独特视角书写爱与欲，真诚动人，但技巧粗糙，重复较多。",
    "惊竹娇": "网红金句，《你是我所有诗里的病句》短平快。深度为零，易过气。他是诗歌界的抖音，刷过就忘。其诗句适合社交传播，但缺乏文学价值，属于一次性消费品。",
    "曹韵": "《将生活一饮而尽》像啤酒广告。网易云诗人，情感廉价。他的诗是快餐，管饱但没营养。他善于制造伪文艺腔调，空洞抒情，很快会被遗忘。",
    "马雁": "当代天才，《马雁诗集》敏锐痛感。英年早逝，光芒耀眼。她是诗歌界的流星，划破夜空，留下永恒的光痕。她的诗融合了知性与感性，语言干净有力，可惜太早离开。",
    "夏宇": "后现代魔术师，《备忘录》《腹语术》语言游戏。才华横溢，智性过强。她的诗是词语的游乐场，玩得开心但容易迷路。她打破了诗歌的常规语法与意义，创意十足，但有时流于炫技。",
    "陈先发": "《写碑之心》《九章》厚重，古典现代融合。晦涩，门槛高。他的诗是古碑，需要耐心拓印。他善于从古典中汲取养分，但语言过于凝练，普通读者难以进入。",
    "雷平阳": "《云南记》《基诺山》质朴有力，土地情怀。重复，后期乏力。他的诗是红土地，厚实但单调。他以云南风土为背景，书写底层与自然，情感真挚，但题材与手法重复较多。",
    "臧棣": "《协会》《入门》系列繁复，学院派炫技。难懂，让人望而生畏。他的诗是密码，需要破译。他致力于诗歌智性化，但语言高度抽象，缺乏情感温度。",
    "胡续冬": "《日历之力》《旅行/诗》幽默，日常。英年早逝，潜力未展。他的诗是街边小摊，亲切但不精致。他善于用口语和戏谑书写日常，生趣盎然，但未及深化。",
    "许立志": "《我弥留之际》《铁钉》绝望，打工诗人。真实震撼，但艺术粗糙。他的诗是血书，惨烈但不可复制。他以生命为代价书写底层苦难，直白有力，但缺乏技巧打磨。",
    "杜甫": "诗圣，沉郁顿挫，家国情怀。律诗登峰造极，三吏三别写尽乱世苍生。他的诗是血泪写成的历史，一字一句都是民族的伤疤。后人学杜，得其皮者多，得其骨者寡。他真正做到了“诗史”合一，将个人命运与时代苦难融为一体，是现实主义诗歌不可逾越的高峰。",
    "李白": "诗仙，飘逸豪放，天马行空。想象力冠绝古今，酒入豪肠，七分酿成月光，三分啸成剑气。他的诗不可学，只可羡慕。他打破了所有格律的束缚，用最自由的语言表达最狂放的情感，是浪漫主义诗歌的巅峰。",
    "王维": "诗佛，空灵禅意，诗中有画。山水田园的极致，以静写动，以空写有。读他的诗如饮清泉，洗去尘嚣。他将禅宗思想与自然山水完美融合，创造出一种空明澄澈的意境，对后世文人画影响深远。",
    "白居易": "诗魔，通俗晓畅，关心民瘼。《长恨歌》《琵琶行》叙事抒情兼备。他倡导新乐府运动，诗歌平易近人，老妪能解。虽有时流于浅白，但其现实关怀和艺术成就不可忽视。",
    "李商隐": "诗谜，朦胧深婉，用典精妙。无题诗开创了爱情诗的新境界，情感隐晦而缠绵。他的诗如锦瑟，弦弦掩抑，声声思。后人解读众说纷纭，正是其魅力所在。",
    "苏轼": "诗神，旷达洒脱，理趣盎然。题材广阔，风格多变，既有“大江东去”的豪放，也有“十年生死”的深情。他以诗为词，拓宽了诗歌的表现领域，是宋代文化的代表。",
    "辛弃疾": "词中之龙，雄深雅健，以文为词。将爱国情怀与英雄气概注入词中，笔力纵横，意象奇崛。他的词是刀枪剑戟的轰鸣，也是田园风光的低语，刚柔并济。",
    "陶渊明": "隐逸诗宗，自然冲淡，田园诗鼻祖。他的诗如秋菊，淡雅而耐品。“采菊东篱下，悠然见南山”成为千古绝唱。他开创了田园诗的传统，影响了一代又一代文人。",
    "屈原": "楚辞之祖，香草美人，忠怨之辞。《离骚》是浪漫主义的源头，想象瑰丽，情感炽烈。他用生命书写了爱国主义诗歌的篇章，成为后世文人精神上的楷模。",
    "但丁": "中世纪最后一位诗人，新时代第一位诗人。《神曲》以宏大的叙事构建了地狱、炼狱、天堂的宇宙图景，象征与寓言交织。他使用意大利俗语写作，奠定了现代意大利语的基础。其诗充满了对人性、神性与政治的深刻思考，是西方文学的基石之一。",
    "彼特拉克": "文艺复兴先驱，十四行诗巨匠。他将十四行诗体推向完美，歌颂劳拉的诗作成为欧洲抒情诗的典范。他的人文主义思想和对古典文化的热爱，开启了后世抒情诗的新纪元。",
    "歌德": "德国文学巅峰，狂飙突进代表。《浮士德》是其毕生之作，探索了人类知识、欲望与救赎的宏大主题。他的抒情诗情感真挚，哲理深刻，影响了整个欧洲浪漫主义。",
    "席勒": "德国古典文学巨匠，与歌德并称。他的诗充满理想主义和对自由的呼唤，戏剧《威廉·退尔》传颂至今。其诗歌雄辩有力，但有时概念化较重。",
    "荷尔德林": "德国浪漫派先驱，诗哲。他的诗将自然、神性与故乡紧密相连，语言纯粹而崇高。他生前默默无闻，死后被奉为经典，对海德格尔哲学产生重要影响。",
    "华兹华斯": "湖畔派领袖，英国浪漫主义奠基人。他主张诗歌采用日常语言，歌颂自然与童心。《序曲》《丁登寺》等作品开创了自传性长诗的新形式。他的诗宁静而深邃，如湖光山色。",
    "柯勒律治": "浪漫派奇才，《古舟子咏》《忽必烈汗》充满超自然色彩。他将梦幻与象征融入诗歌，影响了后来的象征主义。其创作量少，但质量奇高。",
    "拜伦": "浪漫主义英雄，诗坛浪子。《恰尔德·哈罗德游记》《唐璜》塑造了“拜伦式英雄”形象，叛逆、忧郁、热烈。他的诗风奔放，嘲讽犀利，对欧洲民族解放运动产生过影响。",
    "雪莱": "浪漫主义云雀，《西风颂》《云雀颂》充满革命激情与理想主义。他的诗如西风般强劲，预言了未来的变革。他信奉无神论和自由恋爱，是一位理想主义的战士。",
    "济慈": "唯美主义先驱，以美为真理。夜莺颂、希腊古瓮颂将美感推向极致。他追求“消极能力”，即沉浸在美与不确定中的能力。英年早逝，却留下永恒的芬芳。",
    "布莱克": "浪漫派先驱，神秘主义诗人。他的诗配以自刻版画，意象独特，充满宗教与幻想的张力。其“天真与经验之歌”揭示了人性的两面，影响深远。",
    "惠特曼": "《草叶集》自由体之父，歌颂自我与民主。粗犷奔放，拥抱大地与肉体。他的诗是美国的宣言，豪迈而自信。他打破了传统诗歌的格律和形式，用自由奔放的诗歌语言赞美普通人、身体和自然，影响了一代又一代诗人。",
    "艾米莉·狄金森": "隐逸诗人，天才女巫。她的大部分诗作生前未发表，死后才被发掘。她的诗短小精悍，破折号与斜体独特，主题涵盖死亡、永恒、自然与心灵。她是美国诗歌的异数，也是高峰。",
    "爱伦·坡": "哥特大师，侦探小说鼻祖。他的诗歌《乌鸦》《安娜贝尔·李》充满忧郁、美与死亡的旋律。他主张诗歌应追求“效果”，对法国象征派产生深远影响。",
    "兰波": "通灵者，颠覆传统。地狱一季、彩画集开创象征主义。他的诗是炸药，炸碎了旧诗学的围墙。他主张诗人通过“长期、巨大、理性的混乱”成为通灵者，其作品充满了幻觉、叛逆与青春的能量，是现代诗歌的鼻祖之一。",
    "马拉美": "象征主义领袖，纯诗理论家。《牧神的午后》语言晦涩，追求音乐性与暗示。他认为诗歌应暗示而不是描述，开启了现代诗歌的“炼金术”传统。",
    "魏尔伦": "象征派诗人，音乐性极强。他的诗《秋歌》《月光》忧郁、朦胧，追求“音乐先于一切”。他的生活放荡不羁，诗却精致哀婉，形成鲜明对照。",
    "波德莱尔": "现代主义先驱，《恶之花》将丑恶与病态引入诗歌。他发掘了城市中的“美”，用象征手法表达忧郁与理想。他的诗是现代人孤独、厌倦与欲望的写照。",
    "瓦雷里": "纯诗理论大师，《海滨墓园》哲思深邃。他将诗歌视为智性的体操，语言精炼，意象凝定。他的诗冷静、精确，代表了象征主义的顶峰。",
    "里尔克": "德语现代诗巅峰，《杜伊诺哀歌》《致俄耳甫斯的十四行诗》探索存在、死亡与转化。他的诗语言凝练，意象神秘，影响了几代诗人。他强调“诗是经验”，主张诗人应深入万物内部。",
    "保罗·策兰": "《死亡赋格》对苦难的极致书写，语言破碎却力量惊人。他的诗是大屠杀后的哀歌，每一个词都带着灰烬。他创造了独特的诗学语言，将德语扭曲、拆解、重组，以表达不可言说的创伤，是二十世纪最深刻的诗人之一。",
    "特拉克尔": "表现主义诗人，意象灰暗，充满崩溃与腐烂。他的诗如“恶之华”，在死亡与疯狂中寻求救赎。其语言富有音乐性，但读来令人压抑。",
    "曼德尔施塔姆": "阿克梅派代表，俄罗斯白银时代巨匠。他的诗严谨、雕塑般质感，对文化记忆有深刻把握。他因讽刺斯大林而遭迫害，其诗成为极权下的见证。",
    "阿赫玛托娃": "俄罗斯诗歌的月亮，阿克梅派核心。《安魂曲》写尽了大清洗时代的苦难，情感克制而震撼。她的爱情诗细腻婉转，后期作品充满家国悲痛。",
    "茨维塔耶娃": "俄罗斯天才女诗人，激情澎湃。她的诗节奏强烈，破折号与感叹号密集，情感如风暴。她的命运坎坷，最终自杀，诗却如烈火燃烧。",
    "马雅可夫斯基": "未来主义代表，革命诗人。他的诗阶梯式排列，语言粗犷有力，歌颂革命与未来。他擅长宏大叙事和鼓动宣传，但有时流于口号化。",
    "叶赛宁": "俄罗斯田园诗人，意象派代表。他的诗描绘乡村自然与农民生活，情感真挚，略带忧郁。他被称为“最后的乡村诗人”，后因精神危机自杀。",
    "普希金": "俄罗斯诗歌的太阳，抒情诗与小说双峰。语言质朴却深情，奠定了现代俄语文学。他的诗是俄国的启蒙之光，融合了浪漫主义与现实主义，对后来的俄罗斯作家产生了深远影响。",
    "莱蒙托夫": "俄罗斯诗人，小说家。继普希金后又一巨匠，作品充满叛逆与孤独。《当代英雄》开创了心理小说先河。其诗歌《帆》《诗人之死》情感强烈。",
    "帕斯捷尔纳克": "诺贝尔文学奖得主，《日瓦戈医生》作者。早期诗歌未来主义色彩，后期回归传统。他的诗意象独特，对自然与爱情有细腻描写，但叙事诗更出色。",
    "布罗茨基": "俄裔美国诗人，诺贝尔奖得主。他的诗严谨智性，融合俄语与英语传统。他善于用长句和复杂意象探讨时间、语言与流亡。其散文成就同样卓越。",
    "聂鲁达": "智利诗人，诺贝尔奖得主。《二十首情诗和一支绝望的歌》风靡世界，后期《漫歌》歌颂拉美历史与人民。他的诗意象鲜活，情感饱满，政治热情与爱情交织。",
    "博尔赫斯": "阿根廷作家，诗人。他的诗短小精悍，充满迷宫、镜子、图书馆等象征，探讨时间、永恒与无限。他融合哲学与幻想，创造出独特的智性诗意。",
    "帕斯": "墨西哥诗人，诺贝尔奖得主。《太阳石》融合神话、历史与自我，气势磅礴。他的诗探索墨西哥身份与孤独，语言繁复而富有节奏感。",
    "洛尔迦": "西班牙诗人，戏剧家。他的诗融合民间谣曲与超现实主义，《吉普赛谣曲》《诗人在纽约》意象奇异，情感炽烈。他因政治立场被杀害，成为永恒的符号。",
    "希梅内斯": "西班牙诗人，诺贝尔奖得主。《小毛驴与我》散文诗清澈感人，他的抒情诗追求纯粹的忧伤与光。他影响了“二七年一代”。",
    "米沃什": "波兰诗人，诺贝尔奖得主。他的诗见证二十世纪极权与流亡，语言朴素而有力。《被禁锢的头脑》《礼物》等作品充满道德严肃性与历史沉思。",
    "辛波斯卡": "波兰诗人，诺贝尔奖得主。她的诗机智、幽默，善于从日常事物中挖掘哲学趣味。《万物静默如谜》等诗集风靡全球。她用轻灵的语言探讨严肃的主题。",
    "赫伯特": "波兰诗人，古典与现代融合。他的诗以历史、神话为背景，探讨道德与权力。语言冷峻、反讽，被誉为“欧洲文明的守护者”。",
    "塞弗尔特": "捷克诗人，诺贝尔奖得主。他的诗早期先锋，后期回归传统，歌颂爱情、布拉格与平凡生活。语言优美，情感真挚。",
    "萨福": "古希腊女诗人，抒情诗鼻祖。她的诗残篇中保留着对爱情与友谊的细腻歌唱，情感直白热烈。柏拉图称她为“第十位缪斯”。",
    "卡图卢斯": "古罗马诗人，抒情诗大师。他的爱情诗献给“莱斯比娅”，情感奔放、痛苦与嫉妒交织，开创了西方爱情诗的传统。",
    "奥维德": "古罗马诗人，《变形记》是神话史诗的杰作，用变形的故事串联起希腊罗马神话。他的爱情诗《爱的艺术》轻佻幽默，曾因道德原因被流放。",
    "维吉尔": "古罗马最伟大诗人，《埃涅阿斯纪》是拉丁史诗的典范。他融合荷马史诗传统与罗马爱国精神，语言庄重，结构严谨。但丁视其为向导。",
    "贺拉斯": "古罗马诗人，诗艺理论家。《颂诗集》优美典雅，《诗艺》对后世古典主义影响深远。他提出“寓教于乐”，倡导适度与节制。",
    "裴多菲": "匈牙利爱国诗人，革命战士。“生命诚可贵，爱情价更高。若为自由故，两者皆可抛”传诵至今。他的民歌体诗歌热情奔放，充满民族解放精神。",
    "泰戈尔": "印度诗人，诺贝尔奖得主。《吉檀迦利》《飞鸟集》充满东方智慧与神秘主义。他的诗清新自然，赞美生命、爱与神性，影响了西方读者。",
    "纪伯伦": "黎巴嫩诗人，哲理散文诗大师。《先知》以先知口吻谈论爱、婚姻、自由等主题，语言优美，充满东方智慧。他的画同样著名。",
    "阿多尼斯": "叙利亚诗人，当代阿拉伯诗歌巨匠。他致力于诗歌现代化，批判传统与政治。他的诗意象奇崛，充满流亡、变革与自由的呼声。",
    "达尔维什": "巴勒斯坦民族诗人，反抗与乡愁的歌手。他的诗写尽了流亡、土地与和平的渴望，语言坚韧而忧伤，是巴勒斯坦人民的声音。",
    "谷川俊太郎": "日本当代国民诗人，语言简洁，富有童心与哲思。他写爱情、生命、日常，也写反战。他的诗被广泛翻译，影响深远。",
    "石川啄木": "日本短歌诗人，生活派。他的歌集《一握之砂》用口语写尽日常的疲惫、孤独与细微感动，开创了短歌的新境界。",
    "金子美铃": "日本童谣诗人，英年早逝。她的诗以儿童视角观察自然与生活，纯真、善良，充满对生命的悲悯。去世后被重新发掘，感动无数人。",
    "松尾芭蕉": "日本俳圣，将俳谐提升为艺术。他的《奥之细道》纪行与俳句融合，追求“轻、寂、闲寂”的境界。他的俳句“古池や蛙飛びこむ水の音”成为经典。",
    "小林一茶": "日本俳句大师，风格平民化，幽默中带着苦涩。他写青蛙、跳蚤、故乡与亲情，语言俚俗，感情真挚。“やれ打つな蝿が手をすり足をする”是其名句。",
    "与谢芜村": "日本俳句巨匠，画家。他的俳句追求绘画般的意境与浪漫，风格华丽，与芭蕉的闲寂形成对比。其俳画一体，艺术成就极高。",
    "西条八十": "日本诗人，童谣作家。他的诗风唯美、伤感，被誉为“诗坛的王子”。童谣《金色の魚》等作品广为人知。",
    "宫泽贤治": "日本诗人，童话作家。他的诗《不畏风雨》体现无私奉献的理想主义。他的童话《银河铁道之夜》充满孤独与自我牺牲的美感。",
    "叶芝": "爱尔兰诗人，诺贝尔奖得主。他的诗早期浪漫，后期转向神秘主义与象征。《当你老了》《第二次降临》等作品深刻影响现代诗歌。他是爱尔兰文艺复兴的领袖。",
    "艾略特": "英美现代派诗歌大师，诺贝尔奖得主。《荒原》是现代诗歌的里程碑，《四个四重奏》深邃哲思。他主张非个人化与客观对应物，重塑了诗歌批评。",
    "奥登": "英国诗人，二十世纪重要声音。他的诗风格多变，早期犀利左翼，后期宗教与存在主义。他善于用传统形式处理现代主题，机智而深刻。",
    "拉金": "英国诗人，运动派代表。他的诗写日常、爱情、死亡与英国生活，语言口语化，情感克制，充满反讽与忧郁。《高窗》等诗集影响深远。",
    "休斯": "英国诗人，桂冠诗人。他的诗充满野性，关注自然暴力与原始力量。《雨中鹰》《乌鸦》等作品语言生猛，意象骇人。他是普拉斯的丈夫。",
    "希尼": "爱尔兰诗人，诺贝尔奖得主。他的诗扎根乡土，语言精确，挖掘爱尔兰历史与沼泽。他的自然诗与政治诗同样出色，被誉为叶芝之后最重要的爱尔兰诗人。",
    "狄兰·托马斯": "威尔士诗人，超现实主义风格。他的诗声音宏亮，意象密集，赞美生命与死亡。“不要温和地走进那个良夜”是其名句。他的朗诵极具感染力。",
    "罗塞蒂": "英国诗人，拉斐尔前派成员。他的诗《怀念》等细腻哀婉，充满中世纪风格。他也是画家，与妹妹克里斯蒂娜·罗塞蒂同为诗人。",
    "勃朗宁": "英国诗人，戏剧独白大师。他的诗《我已故的公爵夫人》等以人物口吻独白，揭示心理与性格。其诗较艰深，对现代诗歌有影响。",
    "丁尼生": "英国桂冠诗人，维多利亚时代代表。他的诗音律优美，《悼念集》悼念友人，思考信仰与死亡。《轻骑兵冲锋》等叙事诗广为传诵。",
    "马维尔": "英国玄学派诗人，以《致羞怯的情人》闻名。他的诗机智，融合爱情与时间哲学，措辞精妙。",
    "赫里克": "英国骑士派诗人，以《致少女，珍惜时光》闻名。他的诗轻快、优美，歌颂及时行乐与田园生活。",
    "本·琼森": "英国诗人，剧作家。他的诗格调典雅，常为友人作赠诗。《给西莉亚》等抒情诗流传甚广。他影响了骑士派诗人。",
    "蒲柏": "英国新古典主义诗人，讽刺大师。他擅用英雄双行体，《夺发记》《愚人志》机智犀利，对人性弱点冷嘲热讽。其译著荷马史诗也广受赞誉。",
    "约翰·邓恩": "玄学派诗歌鼻祖，奇喻大师。他的爱情诗与宗教诗充满哲学思辨，意象奇崛（如“跳蚤”）。他的诗被现代派重新发掘，影响巨大。",
    "乔治·赫伯特": "英国玄学派诗人，宗教诗人。他的诗献给上帝，形式巧妙（如祭坛诗、翅膀诗），情感真挚，语言朴实。",
    "霍普金斯": "英国维多利亚诗人，创新韵律。他发明了“跳韵”，语言凝练，意象奇特。他的诗死后才出版，影响了二十世纪诗人。",
    "佩索阿": "葡萄牙诗人，异名者。他创造了数十个异名，每个异名有不同的风格、传记与世界观。《惶然录》是他的散文杰作。他的诗是现代主义的重要现象。",
    "卡瓦菲斯": "希腊诗人，同性恋。他的诗以历史题材与当代日常结合，风格简洁，情感克制，擅长捕捉瞬间的感官与欲望。",
    "塞菲里斯": "希腊诗人，诺贝尔奖得主。他的诗融合希腊神话与现代经验，语言沉静，意象清晰，抒写流亡与乡愁。",
    "埃利蒂斯": "希腊诗人，诺贝尔奖得主。他的诗赞美阳光、爱琴海与希腊精神，意象明亮，语言奔放，富有超现实主义色彩。",
    "蒙塔莱": "意大利诗人，诺贝尔奖得主。隐逸派代表，他的诗关注存在困境，语言凝练，意象象征。早期《乌贼骨》是经典。",
    "翁加雷蒂": "意大利隐逸派诗人。他的诗极短，往往只有几个词，却充满重量与空白。他追求“词语的绝对”。",
    "夸西莫多": "意大利诗人，诺贝尔奖得主。隐逸派代表，他的诗抒情而哀伤，写故乡西西里与流亡，语言音乐性强。",
    "萨巴": "意大利诗人，里雅斯特诗人。他的诗朴实，写日常生活、爱情与犹太身份，情感坦诚，风格自然。",
    "贝恩": "德国表现主义诗人。他的诗冷峻、医学化，描绘腐烂与虚无，对战后德语诗歌影响深远。",
    "本恩": "德国诗人（注：本恩通常指戈特弗里德·本恩，此处重复，保留原名）。表现主义代表，风格冷峻，关注身体与虚无。",
    "阿伦特": "汉娜·阿伦特，政治哲学家，并非诗人。此处保留原列表，评价：她的思想深刻，但对诗歌无直接影响。",
};

    // ======================= 4. 核心算法与UI =======================
    let currentQuestions = [], currentIndex = 0, quizActive = false, autoTimer = null;
    let radarChart = null;
    function cosineSimilarity(a,b){let d=0,m1=0,m2=0;for(let i=0;i<8;i++){d+=a[i]*b[i];m1+=a[i]*a[i];m2+=b[i]*b[i];}return m1&&m2?d/(Math.sqrt(m1)*Math.sqrt(m2)):0;}
    function shufflePick(){const s=[...MASTER_QUESTIONS];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s.slice(0,20).map(q=>({text:q.text,opts:q.opts,deltas:q.deltas,selectedIdx:null}));}
    function clearTimer(){if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}}
    function renderQuestion(){
        if(!quizActive)return;const q=currentQuestions[currentIndex];questionText.innerText=q.text;let html='';const l=['A','B','C','D'];
        for(let i=0;i<4;i++){html+=`<div class="option" data-opt-index="${i}"><input type="radio" name="qOption" id="opt_${i}" value="${i}" ${q.selectedIdx===i?'checked':''}><label for="opt_${i}"><strong>${l[i]}.</strong> ${q.opts[i]}</label></div>`;}
        html+=`<div class="option unsure-option" data-opt-index="4"><input type="radio" name="qOption" id="opt_unsure" value="4" ${q.selectedIdx===4?'checked':''}><label for="opt_unsure"><strong>❓</strong> 我不确定 / 跳过</label></div>`;
        optionsContainer.innerHTML=html;
        document.querySelectorAll('.option').forEach(div=>{const radio=div.querySelector('input');const idx=parseInt(div.dataset.optIndex);const fn=()=>{if(!radio.checked){radio.checked=true;currentQuestions[currentIndex].selectedIdx=idx;clearTimer();autoTimer=setTimeout(()=>{if(quizActive){if(currentIndex<19)goNextAuto();else computeFinalResult();}},200);}};div.addEventListener('click',fn);if(radio)radio.addEventListener('change',()=>{if(radio.checked){currentQuestions[currentIndex].selectedIdx=idx;clearTimer();autoTimer=setTimeout(()=>{if(quizActive){if(currentIndex<19)goNextAuto();else computeFinalResult();}},200);}});});
        qCounterSpan.innerText=`第${currentIndex+1} / 20题`;progressFill.style.width=`${((currentIndex+1)/20)*100}%`;prevBtn.disabled=(currentIndex===0);nextBtn.disabled=false;
    }
    function goPrev(){if(!quizActive)return;clearTimer();if(currentIndex>0){currentIndex--;renderQuestion();}}
    function goNext(){if(!quizActive)return;if(currentQuestions[currentIndex].selectedIdx===null){alert("请先选择一个选项或「我不确定」");return;}clearTimer();if(currentIndex<19){currentIndex++;renderQuestion();}else computeFinalResult();}
    function goNextAuto(){if(currentIndex<19){currentIndex++;renderQuestion();}else computeFinalResult();}
    function computeFinalResult() {
    clearTimer();
    let unsure = 0;
    for (let q of currentQuestions) if (q.selectedIdx === 4) unsure++;
    if (unsure > 10) {
        showResult("普通读者", 0, "你选了太多「我不确定」，诗魂游离。做个快乐的读者也很好。");
        return;
    }
    let userVec = [0, 0, 0, 0, 0, 0, 0, 0];
    let cnt = 0;
    for (let q of currentQuestions) {
        if (q.selectedIdx !== null && q.selectedIdx !== 4) {
            let d = q.deltas[q.selectedIdx];
            for (let i = 0; i < 8; i++) userVec[i] += d[i];
            cnt++;
        }
    }
    if (cnt === 0) {
        showResult("诗魂未明", 0, "没有有效选择，请重测。");
        return;
    }
    for (let i = 0; i < 8; i++) userVec[i] /= cnt;

    // 计算最佳匹配诗人
    let bestSim = -1, bestPoet = null;
    for (let p of POETS) {
        let sim = cosineSimilarity(userVec, getPoetVector(p));
        if (sim > bestSim) {
            bestSim = sim;
            bestPoet = p;
        }
    }
    showResult(bestPoet, Math.round(bestSim * 100), COMMENTS[bestPoet]);

    // ----- 以下为雷达图与分析 (修复版) -----
    const dimNames = ["意象传统", "语言实验", "抒情强度", "社会关怀", "古典底蕴", "口语化", "忧郁度", "哲理倾向"];
    const scores = userVec.map(v => Math.round(v * 100));

    // 获取 canvas 元素并确保其存在
    const canvas = document.getElementById('radarChart');
    if (!canvas) {
        console.error("radarChart canvas not found");
        return;
    }
    // 重置 canvas 尺寸（避免模糊）
    const ctx = canvas.getContext('2d');
    // 销毁旧图表（如果存在）
    if (window.radarChart && typeof window.radarChart.destroy === 'function') {
        window.radarChart.destroy();
    }
    // 创建新图表
    window.radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: dimNames,
            datasets: [{
                label: '你的诗学气质',
                data: scores,
                backgroundColor: 'rgba(80, 140, 70, 0.3)',
                borderColor: '#2d6a2d',
                pointBackgroundColor: '#5e9b4e',
                pointBorderColor: '#2d6a2d',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                r: {
                    min: 0,
                    max: 20,
                    ticks: { stepSize: 20, backdropColor: 'transparent' },
                    grid: { color: '#cde0c2' },
                    angleLines: { color: '#cde0c2' }
                }
            },
            plugins: {
                tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} 分` } },
                legend: { position: 'top' }
            }
        }
    });

    // 更新维度分数列表
    const dimScoresDiv = document.getElementById('dimensionScores');
    if (dimScoresDiv) {
        let dimHtml = '';
        for (let i = 0; i < 8; i++) {
            dimHtml += `<div class="dimension-item"><span>${dimNames[i]}</span><strong>${scores[i]}</strong></div>`;
        }
        dimScoresDiv.innerHTML = dimHtml;
    }

    // 生成分析文本
    let analysis = "你的诗学气质偏向";
    const maxIdx = scores.indexOf(Math.max(...scores));
    switch (maxIdx) {
        case 0: analysis += "古典意象和传统美学，你倾向于从自然与历史中汲取灵感，追求意境与韵味。"; break;
        case 1: analysis += "语言实验和创新精神，你喜欢打破常规，探索词语的边界，追求陌生化效果。"; break;
        case 2: analysis += "强烈的情感表达，你的诗如烈火，直抒胸臆，不掩饰喜怒哀乐。"; break;
        case 3: analysis += "社会关怀与时代责任，你的笔触关注现实与民众，具有忧患意识。"; break;
        case 4: analysis += "深厚的古典底蕴，你从传统中汲取养分，雅致而含蓄，注重典故与格律。"; break;
        case 5: analysis += "口语化与日常感，你偏爱直接、亲切的表达，让诗歌回归生活。"; break;
        case 6: analysis += "忧郁与内省，你的诗常带有淡淡的哀愁与沉思，擅长挖掘内心幽微。"; break;
        case 7: analysis += "哲理思辨，你喜欢在诗中探讨存在与意义，追求思想的深度。"; break;
        default: analysis += "多元融合，你拥有独特的诗学混合气质。";
    }
    const analysisDiv = document.getElementById('analysisText');
    if (analysisDiv) analysisDiv.innerHTML = analysis;
}
    function showResult(poet,percent,desc){
        document.getElementById('resultTitle').innerText=poet;
        document.getElementById('matchRate').innerHTML=`相符程度 ▸ ${percent}% 诗魂共鸣`;
        document.getElementById('resultDesc').innerHTML=desc;
        startScreen.style.display='none';questionArea.style.display='none';resultScreen.style.display='block';quizActive=false;
    }
    async function shareResult(){
        const poet=document.getElementById('resultTitle').innerText;
        const txt=`我在「诗魂测试」中测出气质最接近的诗人是【${poet}】，你也来试试：https://cosmosoul.github.io/poettest/`;
        try{await navigator.clipboard.writeText(txt);alert("✅ 已复制结果到剪贴板，可分享！");}catch(e){}
        const el=document.getElementById('resultCaptureArea');
        if(el) html2canvas(el,{scale:2,backgroundColor:'#ffffff'}).then(c=>{let a=document.createElement('a');a.download=`诗魂报告_${poet}.png`;a.href=c.toDataURL();a.click();}).catch(()=>alert("截图失败"));
    }
    function startTest(){clearTimer();currentQuestions=shufflePick();currentIndex=0;quizActive=true;startScreen.style.display='none';questionArea.style.display='block';resultScreen.style.display='none';renderQuestion();}
    function restart(){startTest();}
    const startBtn=document.getElementById('startBtn'),prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),restartBtn=document.getElementById('restartBtn'),shareBtn=document.getElementById('shareBtn');
    const questionText=document.getElementById('questionText'),optionsContainer=document.getElementById('optionsContainer'),qCounterSpan=document.getElementById('qCounter'),progressFill=document.getElementById('progressFill');
    startBtn.addEventListener('click',startTest);prevBtn.addEventListener('click',goPrev);nextBtn.addEventListener('click',goNext);restartBtn.addEventListener('click',restart);shareBtn.addEventListener('click',shareResult);
</script>
