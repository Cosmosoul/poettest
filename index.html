</div>

   const COMMENTS = {
    "胡适": "白话诗的开创者，《尝试集》的意义在于破旧而非立新。他的诗如实验报告，语言质朴但缺乏诗意厚度。作为思想家的光芒远盖过诗人身份，但其拓荒精神值得尊重——没有胡适，新诗的路可能更漫长。",
    "刘半农": "民歌体的早期实践者，《教我如何不想她》旋律优美。他的诗有泥土气，但技巧粗糙，多数作品停留在歌谣层面。他是新诗多样化探索的活水，可惜自身成就不足以成为标杆。",
    "徐志摩": "浪漫主义的天鹅，《再别康桥》等作品音律完美，情感充沛。但他一生未走出青春的甜腻，深度不足，被鲁迅讥为'富家公子'。他的诗是蜜糖，少年时迷恋，成年后易觉腻味。",
    "闻一多": "格律派领袖，《死水》以丑为美，力量惊人。他提倡'三美'，将建筑美、音乐美、绘画美注入新诗。后期转向学术与民主运动，创作中断。他是诗人中的战士，但艺术未能臻于化境。",
    "戴望舒": "象征派大师，《雨巷》将古典意象与现代忧郁完美融合。他的诗如江南烟雨，朦胧而哀愁。后期转向革命诗歌，艺术性下降。他是一位被时代耽误的纯粹诗人，作品量少但质精。",
    "卞之琳": "智性诗人，《断章》极简而意蕴无穷。他的诗如水晶，冷而透明，充满哲学思辨。但过于晦涩，普通读者难以进入。他是诗人中的哲学家，也是哲学家中最不像诗人的那一个。",
    "李金发": "中国象征诗第一人，《微雨》将法国象征主义移植到汉语。他的诗语言生硬，翻译腔重，被讥为'诗怪'。历史意义大于艺术价值，为后来的现代主义开辟了荆棘之路。",
    "艾青": "土地与光明的歌者，《大堰河》《雪落在中国的土地上》情感炽烈，苦难意识深刻。他的诗是时代的号角，后期说教偏多，诗性减弱。他是中国新诗史上绕不开的丰碑，尽管碑文有些磨损。",
    "穆旦": "现代主义高峰，《诗八首》冷峻深刻，《赞美》有力。他将西方现代诗技法与中国经验完美焊接。语言有时生硬，情感过于克制，如冰下火焰。他的翻译成就甚至超过创作。",
    "郑敏": "九叶派代表，《金黄的稻束》哲学入诗，思辨强而情感淡。她的诗像哲学论文的分行，冷峻有余，温度不足。在女性诗人中，她是最不'抒情'的一位，但智性光芒独特。",
    "辛笛": "《手掌》温暖，《风景》有古典韵味。九叶派中较柔和的一位，知名度偏低，长期被文学史忽视。他的诗是温吞水，不烫不凉，适合慢性子读者。",
    "陈敬容": "《力的前奏》有力，《雕塑家》等作品有早期女性意识。创作量少，晚年几近沉默。她的诗像刀刻，硬朗但篇幅有限，是一颗被低估的九叶明珠。",
    "杜运燮": "《秋》有特色，《山》等作品理性有余。九叶派边缘人物，容易被遗忘。他的诗冷静节制，但缺少让人记住的锋芒。",
    "袁可嘉": "学者型诗人，《沉钟》等诗论重于诗作。他的价值在于译介西方现代诗和批评，创作只是副业。没有他，九叶派的理论根基会薄弱许多。",
    "北岛": "朦胧诗领袖，《回答》《结局或开始》以警句反抗，冷峻锋利。后期创作渐趋重复，语言愈发抽象。他是时代的良心，但良心的唠叨也会让人疲倦。他的诗属于那个热血年代。",
    "顾城": "童话诗人，《一代人》《我是一个任性的孩子》纯粹而脆弱。后期陷入极端，诗歌走向黑暗。他的诗是水晶，也是玻璃，美丽而易碎。他是诗歌界永远的孩童，也是悲剧。",
    "海子": "麦地之子，《面朝大海，春暖花开》《亚洲铜》燃烧生命的写作。抒情强烈，但部分作品狂乱失控。他是诗歌的殉道者，但殉道不等于伟大。他的死神话了他的诗，也遮蔽了瑕疵。",
    "舒婷": "《致橡树》《神女峰》影响一代人，浪漫温情。后期平淡，重复自我。她是女性诗歌的启蒙者，但启蒙之后需要更深的挖掘。她的诗是少女时代的美好记忆。",
    "食指": "《相信未来》《这是四点零八分的北京》激励无数，精神可嘉。艺术性有限，语言直白如口号。他的价值在于信念，而非技艺。他是那个年代的良心，但不是永恒的诗匠。",
    "多多": "朦胧派最晦涩者，《阿姆斯特丹的河流》意象密集，语言爆炸。小众推崇，大众远离。他是诗人中的诗人，但只适合极小圈子的膜拜。读他的诗像解谜，乐在其中者极少。",
    "芒克": "白洋淀群像，《阳光中的向日葵》直率豪放。粗糙有余，精致不足。他是力量的象征，但力量需要形式来承载。他的诗是烈酒，呛人但后劲足。",
    "西川": "知识分子写作代表，《致敬》《鹰的话语》博学智性。概念化较重，情感稀释。他的诗像学术报告，理性压倒感性。他是诗人中的学者，但学者气太浓会杀死诗意。",
    "欧阳江河": "词语炼金术士，《玻璃工厂》《傍晚穿过广场》华丽繁复。阅读疲劳，普通读者难以进入。他制造了语言的迷宫，却忘了留出口。他的诗是词语的狂欢，也是读者的噩梦。",
    "于坚": "口语诗开创者，《尚义街六号》《0档案》日常史诗。质量参差，长篇冗长。他打开了诗歌的日常之门，但门内有时是杂物间。他的诗是生活的流水账，有时精彩，有时无聊。",
    "韩东": "《有关大雁塔》解构经典，反抒情。《你见过大海》影响巨大。他是观念的诗人，不是语言的魔术师。个人魅力大于文本，但观念本身也是诗的一种力量。",
    "伊沙": "身体写作，《车过黄河》《饿死诗人》解构成癖。争议极大，粗糙生猛。他像诗歌界的闹钟，吵醒很多人，但自己不够清醒。他的诗是行为艺术，价值在于姿态。",
    "翟永明": "女性诗歌重要声音，《女人》《静安庄》黑暗有力。后期内敛，风格变化。她是黑暗中的舞者，舞步渐缓但从未停歇。她的诗是女性的独白，也是时代的低语。",
    "张枣": "语言魔术师，《镜中》《何人斯》不朽。产量极少，但质量极高。他是诗歌界的流星，短暂而耀眼，留下永远的遗憾。他的诗是汉语的极致游戏，玩得漂亮，但太短。",
    "柏桦": "《苏州记事》《在清朝》抒情浓郁，江南才子。格局较小，题材重复。他的诗是精致的盆景，美则美矣，缺乏气象。他是当代的晚唐诗人，精致而颓废。",
    "骆一禾": "早逝诗人，《修远》《大河》大气。未充分展开，神话多于实绩。他是一颗未完成的恒星，光芒更多来自想象。他的诗是未完的交响，断章亦动人。",
    "戈麦": "《誓言》《南方》悲怆，早逝神话。作品尖锐，但总量少。他是诗歌界的夭折天才，评价往往偏高。他的诗是匕首，锋利但短促。",
    "杨炼": "文化史诗，《诺日朗》《敦煌》雄浑。空洞堆砌，概念先行。他建造了词语的宫殿，但里面空无一人。他的诗是壮丽的废墟，震撼但无法居住。",
    "江河": "《太阳和他的反光》炫技，过犹不及。他的诗像杂技表演，惊叹于技巧，感动于内容。他是朦胧派中最被低估的一个，也是形式大于内容的一个。",
    "王小妮": "口语化日常，《月光》《上课记》淡雅。过于平淡，缺乏张力。她的诗是白开水，解渴但无味。她是生活的记录者，但记录不等于诗。",
    "林徽因": "才女光环，《你是人间的四月天》温暖。诗才非顶尖，建筑成就更高。她的诗是客厅里的花瓶，好看但不必深究。她是民国才女的象征，不是诗人的标杆。",
    "郑愁予": "《错误》古典韵味，浪子情怀。重复自我，后期乏力。他的诗是古典的回声，越传越弱。他是台湾现代诗的重要声音，但声音逐渐沙哑。",
    "余光中": "《乡愁》《白玉苦瓜》家喻户晓，抒情熟练。后期滥情，口水化。他是乡愁的代言人，但乡愁说多了也烦。他的诗是教科书上的经典，也是课堂上的催眠曲。",
    "洛夫": "超现实主义，《石室之死亡》《漂木》晦涩。冗长，结构松散。他的诗是黑夜中的巨兽，庞大但看不清面目。他是诗歌界的修行者，但修行过于私密。",
    "痖弦": "《深渊》《如歌的行板》绝望，张力强。作品少，影响大。他的诗是锋利的刀，但刀身太短。他是台湾现代诗的异数，也是绝响。",
    "周梦蝶": "《孤独国》《还魂草》禅意，孤绝。过于冷寂，拒人千里。他的诗是雪山的莲花，高洁但无法靠近。他是诗僧，但僧袍太厚，诗意太薄。",
    "席慕蓉": "《一棵开花的树》《七里香》小清新，浅薄。畅销诗人的典型，情感廉价。她的诗是糖水，甜但无营养。她是无数少女的诗歌初恋，但初恋往往不长久。",
    "汪国真": "鸡汤顺口溜，浅薄励志。《热爱生命》《山高路远》缺乏诗意，格言化。他是诗歌界的成功学大师，与诗的本质背道而驰。他的诗是青春期的止痛片，药效短，副作用大。",
    "余秀华": "《穿过大半个中国去睡你》《摇摇晃晃的人间》直白大胆，真情实感。依赖身体叙事，题材重复。她是一把野火，烧得旺，但燃料有限。她的诗是生命的呐喊，但呐喊也会嘶哑。",
    "廖伟棠": "香港代表，《末日之歌》《春盏》苍凉。文艺老青年，情怀大于技艺。他的诗是异乡人的叹息，听多了会厌。他是香港诗歌的守夜人，但夜色太浓。",
    "沈浩波": "下半身旗手，《蝴蝶》《文楼村》车祸现场。粗糙，自恋。他的诗是行为艺术，意义在于姿态而非文本。他是诗歌界的叛逆者，但叛逆需要才华支撑。",
    "朵渔": "《高原上的野花》《今夜写诗是轻浮的》真诚。自我剖析过度，格局较小。他的诗是内心的解剖，但解剖久了会麻木。他是诚实的诗人，但诚实不等于深刻。",
    "尹丽川": "女版伊沙，《为什么不再舒服一点》直白。力度不足，影响力有限。她的诗是辣椒，辣但后劲不足。她是女性身体写作的代表，但代表之作尚未出现。",
    "惊竹娇": "网红金句，《你是我所有诗里的病句》短平快。深度为零，易过气。他是诗歌界的抖音，刷过就忘。他的诗是年轻人的速食文化，好吃但没营养。",
    "曹韵": "《将生活一饮而尽》像啤酒广告。网易云诗人，情感廉价。他的诗是快餐，管饱但没营养。他是网络时代的诗歌泡沫，一戳就破。",
    "丝绒陨": "《年轻人，请忍受一下》说教。文艺装腔，自恋。他的诗是年轻人的迷药，醒来后头疼。他是文艺青年的精神领袖，但领袖往往独断。",
    "马雁": "当代天才，《马雁诗集》敏锐痛感。英年早逝，光芒耀眼。她是诗歌界的流星，划破夜空，留下永恒的光痕。她的诗是未完成的天鹅绝唱。",
    "夏宇": "后现代魔术师，《备忘录》《腹语术》语言游戏。才华横溢，智性过强。她的诗是词语的游乐场，玩得开心但容易迷路。她是华语诗坛最独特的声线，没有之一。",
    "陈先发": "《写碑之心》《九章》厚重，古典现代融合。晦涩，门槛高。他的诗是古碑，需要耐心拓印。他是当代汉语诗歌的炼金士，语言密度惊人。",
    "雷平阳": "《云南记》《基诺山》质朴有力，土地情怀。重复，后期乏力。他的诗是红土地，厚实但单调。他是云南的诗人，也是中国的诗人，但地域性有时是双刃剑。",
    "张执浩": "《宽阔》《高原上的野花》平和，日常诗意。辨识度不高，温吞水。他的诗是午后的阳光，温暖但不耀眼。他是日常生活的捕手，但捕到的多是麻雀。",
    "刘年": "《独坐》《楚歌》苍凉，行吟诗人。情感真挚，但技巧粗糙。他的诗是独行者的歌，真诚但单调。他是行走在大地上的歌者，但歌声有时走调。",
    "王单单": "《山冈诗稿》《春山空》粗粝，底层视角。技巧不足，力量有余。他的诗是山石，原始但硌脚。他是底层写作的代表，但代表需要更精湛的技艺。",
    "灯灯": "《余音》《我说嗯》清冽，女性细腻。影响力小，有待沉淀。她的诗是泉水，清澈但流量小。她是值得关注的女性声音，但尚未形成独特气象。",
    "林珊": "《小悲欢》《最好的秋天》温婉，清新。深度欠缺，流于表面。她的诗是小品，轻松但不够深刻。她是青年诗人中的佼佼者，但佼佼者需要更长的跑道。",
    "张二棍": "《旷野》《入林记》沉重，苦难书写。真实感人，但重复。他的诗是伤疤，真实但不愿多看。他是底层生活的记录仪，但记录仪需要更广的视角。",
    "李元胜": "《我想和你虚度时光》《无限事》浪漫，畅销诗人。浅白，深度不足。他的诗是咖啡，香但不解渴。他是诗坛的流行歌手，流行不等于经典。",
    "娜夜": "《起风了》《睡前书》优雅，抒情自然。格局不大，精致但小气。她的诗是瓷器，精美但易碎。她是西部女性诗人的代表，但西部不止有优雅。",
    "大解": "《悲歌》《群峰》宏大，史诗追求。空泛，概念先行。他的诗是远景，壮观但模糊。他是北方史诗的追求者，但史诗需要细节的支撑。",
    "汤养宗": "《去人间》《三人颂》奇崛，修辞密集。接受门槛高，小众。他的诗是迷宫，进去难出来。他是语言的手艺人，但手艺过于繁复。",
    "胡弦": "《沙漏》《定风波》精致，哲理融入。稳定但无惊喜。他的诗是玉器，温润但少了锋芒。他是江南诗风的当代传人，但传人往往不如开山者。",
    "路也": "《江心洲》《雨后》率性，女性独立。佳作少，后劲不足。她的诗是风，来去匆匆。她是女性写作的独行侠，但独行容易寂寞。",
    "蓝蓝": "《内心生活》《民歌》纯粹，童真与悲悯。小众，传播有限。她的诗是萤火虫，微弱但真诚。她是诗坛的隐士，隐士的光芒需要时间去发现。",
    "吕德安": "《父亲与我》《傍晚》质朴，口语叙事。名气不足，被低估。他的诗是旧棉袄，温暖但不时髦。他是口语诗的先行者之一，值得重新发现。",
    "宋琳": "《门厅》《雪夜访戴》优雅，知识分子腔。冷门，圈子内传播。他的诗是古琴，雅但曲高和寡。他是海外诗人的代表，但海外不是避难所。",
    "树才": "《单独者》《节奏》哲思，翻译家诗人。平淡，缺乏辨识度。他的诗是翻译腔的中文，隔了一层。他是中法诗歌的摆渡人，但自己的船不够漂亮。",
    "臧棣": "《协会》《入门》系列繁复，学院派炫技。难懂，让人望而生畏。他的诗是密码，需要破译。他是学院派诗歌的集大成者，但大成往往意味着封闭。",
    "周伟驰": "《避雷针》《蜃景》智性，哲理诗。枯燥，缺乏诗意。他的诗是数学公式，正确但无趣。他是诗人中的哲学家，但哲学需要诗意的翅膀。",
    "王敖": "《绝句》《黄鹤楼》实验，灵动。理解困难，小众狂欢。他的诗是杂技，惊险但不实用。他是当代诗歌的异数，异数需要更多同路人。",
    "姜涛": "《洞中一日》《鸟经》学院气，批判性。诗学强于诗，创作平庸。他的诗是论文，理性压倒感性。他是优秀的批评家，但批评家未必是好诗人。",
    "冷霜": "《分叉的烟》《归来》精致，内敛。产量少，影响有限。他的诗是精致的素描，线条优美但内容单薄。他是北大诗派的优秀代表，但代表需要更多作品。",
    "张曙光": "《岁月的遗照》《看电影》沉静，中年写作。平淡，缺乏张力。他的诗是黑白照片，怀旧但无色彩。他是中年写作的样本，但样本不止一种。",
    "孙磊": "《演奏》《朗诵》抒情，音乐性。不突出，存在感弱。他的诗是背景音乐，可有可无。他是70后诗人的一员，但70后需要更鲜明的面孔。",
    "宇向": "《阳光照》《女巫》率真，女性锐利。不够成熟，佳作少。她的诗是火花，一闪即逝。她是女性写作的新锐，但新锐需要持续的燃烧。",
    "轩辕轼轲": "《广陵散》《太公》戏谑，后现代。狂欢化，消解意义。他的诗是恶搞，好笑但不耐看。他是后现代诗歌的玩家，但游戏需要规则。",
    "西娃": "《我把自己分成碎片》《隐疾》痛感，真诚。直白，艺术性不足。她的诗是哭诉，真情但缺乏节制。她是感性写作的代表，但感性需要理性的约束。",
    "杨键": "《暮晚》《哭庙》悲悯，佛教视角。灰暗，让人抑郁。他的诗是挽歌，悲伤但无法慰藉。他是当代的苦行僧，苦行需要救赎的希望。",
    "庞培": "《低语》《母子》柔和，江南气息。无力，缺乏力量。他的诗是细雨，温柔但无力。他是江南诗风的守护者，但守护容易保守。",
    "陈东东": "《点灯》《雨》意象华美，超现实。空洞，情感稀薄。他的诗是烟花，绚烂但短暂。他是上海诗派的代表，但上海不只有霓虹。",
    "王寅": "《说多了就是》《寂静》冷峻，克制。佳作少，影响力小。他的诗是冰，冷但无味。他是第三代诗人的一员，但第三代群星闪耀，他不够亮。",
    "陆忆敏": "《美国妇女杂志》《出梅》先锋，女性自觉。量少，未充分展开。她的诗是闪电，亮但瞬间。她是女性诗歌的先驱，但先驱往往孤独。",
    "宋炜": "《登高》《家语》古典，才气。边缘，无人问津。他的诗是古董，珍贵但无人识。他是民间写作的异类，异类需要耐心等待。",
    "杨小滨": "《后现代主义》戏仿，理论先行。干涩，缺乏诗意。他的诗是理论表演，无趣。他是学者型诗人，但学者气太重。",
    "胡续冬": "《日历之力》《旅行/诗》幽默，日常。英年早逝，潜力未展。他的诗是街边小摊，亲切但不精致。他是北大诗派的幽默分子，幽默是他的标签也是他的局限。",
    "马骅": "《雪山短歌》纯净，理想主义。早逝，成为传奇。他的诗是雪山，纯洁但遥远。他是理想主义的化身，但化身需要肉身。",
    "许立志": "《我弥留之际》《铁钉》绝望，打工诗人。真实震撼，但艺术粗糙。他的诗是血书，惨烈但不可复制。他是打工诗歌的标高，但标高是用生命换来的。",
    "小安": "《卖枇杷》《种烟》天真，女性口语。小众，传播有限。她的诗是童谣，简单但深刻。她是非非女诗人中的异类，异类值得关注。",
    "何小竹": "《6个动词》《苹果》极简，废话诗。观念艺术，阅读感差。他的诗是实验，有趣但无情感。他是废话诗的代表，废话也是一种态度。",
    "杨黎": "《大声》《沙哈拉》口语极端，非非主将。颠覆意义，争议大。他的诗是宣言，响亮但空洞。他是非非主义的旗手，旗手需要风。",
    "吉木狼格": "《静悄悄》《红尾巴》彝族背景，天真。冷门，独特但难入主流。他的诗是山寨，原始但别致。他是少数民族诗歌的重要声音，声音需要传得更远。",
    "乌青": "《对白云的赞美》《大锤》废话鼻祖，消解诗意。争议极大，多数人认为是恶搞。他的诗是行为艺术，观念大于文本。他是诗歌界的杜尚，但杜尚只有一个。",
    "张羞": "《散装麻雀》《瀑布》日常流水账，废话派。无聊，挑战阅读耐心。他的诗是白噪音，催眠。他是废话诗的后继者，后继者需要超越。",
    "刘不伟": "《拆那》《我们》荒诞，社会批判。粗糙，力量有余精致不足。他的诗是砖头，砸人疼但不好看。他是底层批判的诗人，批判需要更精准的武器。",
    "李亚伟": "《中文系》《我是人》第三代代表，豪放。粗砺，但生命力强。他的诗是烈酒，呛人但过瘾。他是莽汉派的灵魂，灵魂需要肉体。",
    "万夏": "《本质》《女人的梦》张扬，莽汉派。气盛，但内容单薄。他的诗是摇滚，喧闹但无旋律。他是莽汉派的旗手，旗手需要更多的旗。",
    "马松": "《灿烂》《春》热烈，生命冲动。边缘，昙花一现。他的诗是火焰，热烈但短暂。他是莽汉派的过客，过客也留下足迹。"
};
    for (let p of POETS) if (!COMMENTS[p]) COMMENTS[p] = "风格独特，值得细读。";

    // ======================= 5. 算法 =======================
    function cosineSimilarity(a,b){let d=0,m1=0,m2=0;for(let i=0;i<8;i++){d+=a[i]*b[i];m1+=a[i]*a[i];m2+=b[i]*b[i];}return m1&&m2?d/(Math.sqrt(m1)*Math.sqrt(m2)):0;}
    let currentQuestions=[], currentIndex=0, quizActive=false, autoTimer=null;
    const startScreen=document.getElementById('startScreen'), questionArea=document.getElementById('questionArea'), resultScreen=document.getElementById('resultScreen');
    const startBtn=document.getElementById('startBtn'), prevBtn=document.getElementById('prevBtn'), nextBtn=document.getElementById('nextBtn'), restartBtn=document.getElementById('restartBtn'), shareBtn=document.getElementById('shareBtn');
    const questionText=document.getElementById('questionText'), optionsContainer=document.getElementById('optionsContainer'), qCounterSpan=document.getElementById('qCounter'), progressFill=document.getElementById('progressFill');
    function shufflePick(){const s=[...MASTER_QUESTIONS];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s.slice(0,20).map(q=>({text:q.text,opts:q.opts,deltas:q.deltas,selectedIdx:null}));}
    function clearTimer(){if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}}
    function renderQuestion(){
        if(!quizActive)return;const q=currentQuestions[currentIndex];questionText.innerText=q.text;let html='';const l=['A','B','C','D'];
        for(let i=0;i<4;i++){html+=`<div class="option" data-opt-index="${i}"><input type="radio" name="qOption" id="opt_${i}" value="${i}" ${q.selectedIdx===i?'checked':''}><label for="opt_${i}"><strong>${l[i]}.</strong> ${q.opts[i]}</label></div>`;}
        html+=`<div class="option unsure-option" data-opt-index="4"><input type="radio" name="qOption" id="opt_unsure" value="4" ${q.selectedIdx===4?'checked':''}><label for="opt_unsure"><strong>❓</strong> 我不确定 / 跳过</label></div>`;
        optionsContainer.innerHTML=html;
        document.querySelectorAll('.option').forEach(div=>{const radio=div.querySelector('input');const idx=parseInt(div.dataset.optIndex);const fn=()=>{if(!radio.checked){radio.checked=true;currentQuestions[currentIndex].selectedIdx=idx;clearTimer();autoTimer=setTimeout(()=>{if(quizActive){if(currentIndex<19)goNextAuto();else computeFinalResult();}},200);}};div.addEventListener('click',fn);if(radio)radio.addEventListener('change',()=>{if(radio.checked){currentQuestions[currentIndex].selectedIdx=idx;clearTimer();autoTimer=setTimeout(()=>{if(quizActive){if(currentIndex<19)goNextAuto();else computeFinalResult();}},200);}});});
        qCounterSpan.innerText=`第${currentIndex+1} / 20题`;progressFill.style.width=`${((currentIndex+1)/20)*100}%`;prevBtn.disabled=(currentIndex===0);nextBtn.disabled=false;
    }
    function goPrev(){if(!quizActive)return;clearTimer();if(currentIndex>0){currentIndex--;renderQuestion();}}
    function goNext(){if(!quizActive)return;if(currentQuestions[currentIndex].selectedIdx===null){alert("请先选择一个选项或「我不确定」");return;}clearTimer();if(currentIndex<19){currentIndex++;renderQuestion();}else computeFinalResult();}
    function goNextAuto(){if(currentIndex<19){currentIndex++;renderQuestion();}else computeFinalResult();}
    function computeFinalResult(){
        clearTimer();let unsure=0;for(let q of currentQuestions)if(q.selectedIdx===4)unsure++;
        if(unsure>10){showResult("普通读者",0,"你选了太多「我不确定」，诗魂游离。做个快乐的读者也很好，不必强求诗人气质。");return;}
        let userVec=[0,0,0,0,0,0,0,0],cnt=0;for(let q of currentQuestions){if(q.selectedIdx!==null&&q.selectedIdx!==4){let d=q.deltas[q.selectedIdx];for(let i=0;i<8;i++)userVec[i]+=d[i];cnt++;}}
        if(cnt===0){showResult("诗魂未明",0,"没有有效选择，请重新测试。");return;}
        for(let i=0;i<8;i++)userVec[i]/=cnt;
        let bestSim=-1,bestPoet=null;for(let p of POETS){let sim=cosineSimilarity(userVec,getPoetVector(p));if(sim>bestSim){bestSim=sim;bestPoet=p;}}
        showResult(bestPoet,Math.round(bestSim*100),COMMENTS[bestPoet]);
    }
    function showResult(poet,percent,desc){document.getElementById('resultTitle').innerText=poet;document.getElementById('matchRate').innerHTML=`相符程度 ▸ ${percent}% 诗魂共鸣`;document.getElementById('resultDesc').innerHTML=desc;startScreen.style.display='none';questionArea.style.display='none';resultScreen.style.display='block';quizActive=false;}
    async function shareResult(){const poet=document.getElementById('resultTitle').innerText;const txt=`我在「诗魂探测仪」中测出最接近的诗人是【${poet}】，你也来试试：https://cosmosoul.github.io/poettest/`;try{await navigator.clipboard.writeText(txt);alert("✅ 已复制结果到剪贴板，可分享！");}catch(e){}const el=document.getElementById('resultCaptureArea');if(el)html2canvas(el,{scale:2,backgroundColor:'#ffffff'}).then(c=>{let a=document.createElement('a');a.download=`诗魂报告_${poet}.png`;a.href=c.toDataURL();a.click();}).catch(()=>alert("截图失败"));}
    function startTest(){clearTimer();currentQuestions=shufflePick();currentIndex=0;quizActive=true;startScreen.style.display='none';questionArea.style.display='block';resultScreen.style.display='none';renderQuestion();}
    function restart(){startTest();}
    startBtn.addEventListener('click',startTest);prevBtn.addEventListener('click',goPrev);nextBtn.addEventListener('click',goNext);restartBtn.addEventListener('click',restart);shareBtn.addEventListener('click',shareResult);
</script>
